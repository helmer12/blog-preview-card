<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@500;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <title>Frontend Mentor | Blog preview card</title>

</head>
<body>
  <main>
    <article class="container">
      <section class="card-top">
        <img class="card-img" src="./assets/images/illustration-article.svg" alt="Illustration article image">
        <button>Learning</button>
        <p>Published 21 Dec 2023</p>
      </section>
      <section class="card-content">
        <h1>HTML & CSS foundations</h1>
        <p>These languages are the backbone of every website, defining structure, content, and presentation.</p>
      </section>
      <section class="card-author">
        <img class ="author-img" src="./assets/images/image-avatar.webp" alt="photo-icon of the author od the blog, greg Hooper.">
        <p>Greg Hooper</p>
      </section>
    </article>
  </main>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by Helmer Duarte Murallas.
  </footer>
</body>
</html>
